{% load wagtailcore_tags %}
{# Freie RichText-Sektion mit optionalem Header #}
<section class="py-16 lg:py-20{% if self.background == 'gray' %} bg-gray-50 dark:bg-gray-800/50{% endif %}">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        {% if self.header %}{% include_block self.header %}{% endif %}
        <div class="prose prose-lg dark:prose-invert max-w-none">{{ self.body|safe }}</div>
    </div>
</section>
