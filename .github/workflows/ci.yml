name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      WEBSITE_DATABASE_URL: "sqlite:///ci.sqlite3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Django system check
        run: python manage.py check

      - name: Tailwind-CSS bauen (wie im Docker-Build)
        run: |
          npm ci
          npm run build:css

      - name: CSS-Build-Check (Safelist-Klassen im kompilierten CSS)
        # Die Block-Templates setzen Farbklassen dynamisch zusammen
        # (bg-{{ card.color }}-600 u. ä.) — dieser Check stellt sicher, dass
        # der Tailwind-Build alle Palette-Klassen enthält und nicht wieder
        # Klassen wegpurged (Safelist in tailwind.config.js).
        run: |
          python - <<'EOF'
          css = open("static/css/styles.css", encoding="utf-8").read()
          colors = ["primary", "green", "blue", "amber", "rose", "teal", "gray"]
          needles = []
          for c in colors:
              needles += [
                  f".bg-{c}-100", f".bg-{c}-600",
                  f".hover\\:bg-{c}-700:hover",
                  f".text-{c}-600", f".border-{c}-200",
              ]
          missing = [n for n in needles if n not in css]
          assert not missing, f"Klassen fehlen im kompilierten CSS: {missing}"
          print(f"OK: {len(needles)} Klassen im CSS vorhanden")
          EOF

      - name: Migrationen (frische SQLite)
        run: python manage.py migrate --no-input

      - name: Seiten-Seeds + Rechtstexte laden
        run: |
          python manage.py setup_initial_pages
          python - <<'EOF'
          from marketing.legal_content import load_legal_content
          content = load_legal_content()
          expected = {"impressum", "agb", "datenschutz", "avv", "kuendigung"}
          missing = expected - set(content)
          assert not missing, f"Rechtstexte fehlen: {missing}"
          print(f"OK: {sorted(content)}")
          EOF

      - name: StreamField-Seeds anwenden
        run: python manage.py migrate_pages_to_streamfield

      - name: Render-Smoke (alle Kernseiten liefern 200 mit Inhalt)
        run: |
          python - <<'EOF'
          import os, django
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "website.settings")
          os.environ.setdefault("ALLOWED_HOSTS", "testserver")
          django.setup()
          from django.test import Client
          c = Client()
          # URL -> Textbausteine, die im gerenderten HTML stehen muessen
          checks = {
              "/": ["Demo anfragen", "Zum RIS-Vergleich", "Ehrlich in Beta"],
              "/produkt/": ["Mandari Insight"],
              "/preise/": ["39,90"],
              "/kommunen/": ["Ratsinformationssystem"],
              "/migration/": ["Bestandsaufnahme"],
              "/roadmap/": ["Session-Pilot"],
              "/vergleich/": ["mandari vs. Sternberg SD.NET", "mandari vs. regisafe"],
              "/vergleich/mandari-vs-sternberg/": ["Stand Juli 2026", "AGPL-3.0", "keine öffentliche Angabe", "Funktion / Kriterium"],
              "/vergleich/mandari-vs-allris/": ["ALLRIS", "Funktion / Kriterium"],
              "/vergleich/mandari-vs-somacos/": ["SessionNet", "Funktion / Kriterium"],
              "/vergleich/mandari-vs-regisafe/": ["BITV-Zertifikat", "Funktion / Kriterium"],
              "/releases/": ["mandari 0.9 (Beta)"],
              "/releases/mandari-0-9-beta/": ["Tombstones", "v0.9.0-beta"],
              "/trust/": ["Subprocessoren"],
              "/transparenz/": ["Transparenzbericht"],
              "/impressum/": ["Impressum"],
              "/datenschutz/": ["Datenschutz"],
              "/agb/": ["AGB"],
              "/kontakt/": ["Kontakt"],
              "/blog/": ["Blog"],
          }
          errors = []
          for url, needles in checks.items():
              r = c.get(url)
              if r.status_code != 200:
                  errors.append(f"{url}: HTTP {r.status_code}")
                  continue
              body = r.content.decode("utf-8")
              for n in needles:
                  if n not in body:
                      errors.append(f"{url}: '{n}' fehlt")
          assert not errors, "Render-Smoke fehlgeschlagen: " + "; ".join(errors)
          print(f"OK: {len(checks)} Seiten gerendert und geprueft")
          EOF
