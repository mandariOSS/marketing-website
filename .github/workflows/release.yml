# Build & push the website image to GHCR on every push to main/dev.
#
# Tags:
#   ghcr.io/mandarioss/website:<branch>              (moving tag, e.g. "main")
#   ghcr.io/mandarioss/website:<branch>-<shortsha>   (immutable, e.g. "main-a1b2c3d")

name: Release

on:
  push:
    branches: [main, dev]

env:
  IMAGE: ghcr.io/mandarioss/website

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PAT statt GITHUB_TOKEN: das 'website'-Package ist (historisch) mit
        # dem mandari-Repo verknuepft; der Repo-scoped GITHUB_TOKEN darf dort
        # nicht schreiben. GHCR_PAT (org-weit, write:packages) loest das.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: mandariSoftware
          password: ${{ secrets.GHCR_PAT }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"
          {
            echo "tags=${IMAGE}:${BRANCH},${IMAGE}:${BRANCH}-${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
